{% extends 'base/base.html' %}

{% block titulo %}Excluir Espaço{% endblock %}

{% block content %}

<div class="card-painel">
    <h4>Excluir espaço</h4>

    <p>
        Tem certeza que deseja excluir o espaço
        <strong>{{ espaco.nome }}</strong>?
    </p>

    <form method="post">
        {% csrf_token %}

        <button type="submit" class="btn btn-danger">
            Sim, excluir
        </button>

        <a href="{% url 'espacos_lista' %}" class="btn btn-outline-dark">
            Cancelar
        </a>
    </form>
</div>

{% endblock %}
