{% extends 'base/base.html' %}

{% block titulo %}Nova Reserva{% endblock %}

{% block content %}

<div class="card-painel">

    {% for message in messages %}
        <div class="alert alert-info">{{ message }}</div>
    {% endfor %}

    <form method="post">
        {% csrf_token %}

        <h4>Dados do cliente</h4>

        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Nome</label>
                <input type="text" name="nome" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Telefone / WhatsApp</label>
                <input type="text" name="telefone" class="form-control">
            </div>

            <div class="col-md-2 d-flex align-items-end">
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" name="socio" id="socio">
                    <label class="form-check-label" for="socio">Sócio</label>
                </div>
            </div>
        </div>

        <hr>

        <h4>Dados da reserva</h4>

        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Espaço</label>
                <select name="espaco" class="form-select" required>
                    <option value="">Selecione</option>
                    {% for espaco in espacos %}
                        <option value="{{ espaco.id }}">{{ espaco.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Data</label>
                <input type="date" name="data" class="form-control" value="{{ data_inicial }}" required>
            </div>

            <div class="col-md-2">
                <label class="form-label">Início</label>
                <input type="time" name="hora_inicio" class="form-control" value="08:00" required>
            </div>

            <div class="col-md-2">
                <label class="form-label">Fim</label>
                <input type="time" name="hora_fim" class="form-control" value="23:00" required>
            </div>
        </div>

        <div class="mt-3">
            <label class="form-label">Observações</label>
            <textarea name="observacoes" class="form-control" rows="4"></textarea>
        </div>

        <div class="mt-4 d-flex gap-2">
            <button class="btn btn-primary-custom" type="submit">
                Salvar reserva
            </button>

            <a href="{% url 'calendario' %}" class="btn btn-outline-dark">
                Cancelar
            </a>
        </div>
    </form>
</div>

{% endblock %}
